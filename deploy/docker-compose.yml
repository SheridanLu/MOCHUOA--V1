version: '3.8'

services:
  # ==================== 基础设施 ====================
  mysql:
    image: mysql:8.0
    container_name: mochu-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: mochu@2026
      MYSQL_DATABASE: mochu_oa
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_general_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ../docs/sql:/docker-entrypoint-initdb.d
    command:
      --innodb-buffer-pool-size=512M
      --max-connections=200
      --innodb-log-file-size=256M
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_general_ci
      --innodb-flush-log-at-trx-commit=1
      --slow-query-log=ON
      --long-query-time=1
      --binlog-format=ROW
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pmochu@2026"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mochu-net

  redis:
    image: redis:7-alpine
    container_name: mochu-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass mochu@2026 --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "mochu@2026", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mochu-net

  minio:
    image: minio/minio:latest
    container_name: mochu-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: mochu_admin
      MINIO_ROOT_PASSWORD: mochu@2026
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mochu-net

  xxl-job-admin:
    image: xuxueli/xxl-job-admin:2.4.1
    container_name: mochu-xxl-job
    restart: unless-stopped
    ports:
      - "8090:8080"
    environment:
      PARAMS: >-
        --spring.datasource.url=jdbc:mysql://mysql:3306/mochu_oa?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
        --spring.datasource.username=root
        --spring.datasource.password=mochu@2026
        --xxl.job.accessToken=mochu-xxl-token-2026
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - mochu-net

  # ==================== 后端应用 ====================
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: mochu-oa-backend
    restart: unless-stopped
    ports:
      - "9090:9090"
    command: >
      java -jar app.jar
        --server.port=9090
        --spring.datasource.url=jdbc:mysql://mysql:3306/mochu_oa?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
        --spring.data.redis.host=redis
        --spring.data.redis.password=mochu@2026
        --minio.endpoint=http://minio:9000
        --xxl.job.admin.addresses=http://xxl-job-admin:8080/xxl-job-admin
    environment:
      JAVA_TOOL_OPTIONS: "-Xms512m -Xmx1024m"
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9090/api/v1/auth/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - mochu-net

  # ==================== 前端 Nginx ====================
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: mochu-oa-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mochu-net

volumes:
  mysql_data:
  redis_data:
  minio_data:

networks:
  mochu-net:
    driver: bridge

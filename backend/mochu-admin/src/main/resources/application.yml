server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: mochu-oa
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/mochu_oa?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: mochu@2026
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  data:
    redis:
      host: localhost
      port: 6379
      password: mochu@2026
      timeout: 3000
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto

# MinIO
minio:
  endpoint: http://localhost:9000
  access-key: mochu_admin
  secret-key: mochu@2026
  bucket-prefix: mochu

# XXL-JOB
xxl:
  job:
    admin:
      addresses: http://localhost:8090/xxl-job-admin
    access-token: mochu-xxl-token-2026
    executor:
      appname: mochu-oa-executor
      port: 9999
      logpath: /tmp/xxl-job/logs

# JWT
jwt:
  secret: mochu-oa-jwt-secret-key-2026-must-be-at-least-256-bits-long
  expiration: 2592000000  # 30 days in milliseconds
  refresh-threshold: 604800000  # 7 days

# Knife4j
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    com.mochu: debug
    org.springframework.security: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
